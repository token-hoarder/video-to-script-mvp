name: AI Automation Pipeline

on:
  push:
    branches:
      - main

jobs:
  document-and-map:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          sudo apt-get install -y tree
          npm install @google/generative-ai

      - name: Generate Changelog with Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          node -e "
          const { GoogleGenerativeAI } = require('@google/generative-ai');
          const { execSync } = require('child_process');
          const fs = require('fs');

          async function run() {
            const genAI = new GoogleGenerativeAI(process.env.GEMINI_API_KEY);
            const model = genAI.getGenerativeModel({ model: 'gemini-2.5-flash' });

            const commitMsg = execSync('git log -1 --pretty=%B').toString();
            const diff = execSync('git diff HEAD~1 HEAD').toString().slice(0, 15000); 

            const prompt = \`Analyze this git commit message and code diff. Write a brief, user-friendly changelog entry explaining what features were added or bugs were fixed. Keep it concise and format it in Markdown.
            
            Commit Message: \${commitMsg}
            Code Diff: \${diff}\`;

            const result = await model.generateContent(prompt);
            let changelog = '';
            if (fs.existsSync('CHANGELOG.md')) {
              changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
            }

            const date = new Date().toISOString().split('T')[0];
            const newContent = '## [' + date + '] - Auto-Generated Update\n\n' + result.response.text() + '\n\n---\n\n' + changelog;

            fs.writeFileSync('CHANGELOG.md', newContent);
          }
          run();
          "

      - name: Generate Architecture Diagram
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          tree -I 'node_modules|.git|.next|public' > tree.txt

          node -e "
          const { GoogleGenerativeAI } = require('@google/generative-ai');
          const fs = require('fs');

          async function run() {
            const genAI = new GoogleGenerativeAI(process.env.GEMINI_API_KEY);
            const model = genAI.getGenerativeModel({ model: 'gemini-2.5-flash' });

            const structure = fs.readFileSync('tree.txt', 'utf8').slice(0, 10000);

            const prompt = \`Analyze this Next.js project directory structure. Create a high-level system architecture diagram using Mermaid.js syntax. Focus on the relationship between the frontend components, API routes, external AI APIs, and the Supabase database. Output strictly valid Mermaid syntax enclosed in \`\`\`mermaid code blocks. Do not explain the code.
            
            Directory Structure:
            \${structure}\`;

            const result = await model.generateContent(prompt);
            const newContent = '# System Architecture\n\n' + result.response.text() + '\n\n*Last updated automatically by Gemini.*';
            
            fs.writeFileSync('ARCHITECTURE.md', newContent);
          }
          run();
          "

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md ARCHITECTURE.md
          git diff --quiet && git diff --staged --quiet || git commit -m "docs: auto-generate changelog and architecture"
          git pull --rebase origin main
          git push