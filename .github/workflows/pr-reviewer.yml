name: AI Code Reviewer

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize]
  schedule:
    - cron: '0 0 * * 0' # Runs every Sunday at midnight

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Required to diff direct pushes

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Google Generative AI
        run: npm install @google/generative-ai

      - name: AI Code Review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          COMMIT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          # 1. Grab the correct diff based on how the action was triggered
          if [ "$EVENT_NAME" == "pull_request" ]; then
            gh pr diff $PR_NUMBER > diff.txt
          else
            git diff HEAD~1 HEAD > diff.txt
          fi

          # 2. Pass the diff to Gemini
          node -e "
          const { GoogleGenerativeAI } = require('@google/generative-ai');
          const fs = require('fs');

          async function run() {
            const genAI = new GoogleGenerativeAI(process.env.GEMINI_API_KEY);
            const model = genAI.getGenerativeModel({ model: 'gemini-2.5-flash' });

            const diff = fs.readFileSync('diff.txt', 'utf8').slice(0, 15000);
            if (!diff.trim()) return;

            const prompt = \`You are a senior code reviewer. Analyze this code diff. Identify any bugs, logic errors, security vulnerabilities, or performance bottlenecks. If the code looks great, say so. Provide a concise, helpful review in Markdown format.
            
            Code Diff:
            \${diff}\`;

            const result = await model.generateContent(prompt);
            fs.writeFileSync('review_comment.md', result.response.text());
          }
          run();
          "
          
          # 3. Post to GitHub
          if [ -s review_comment.md ]; then
            # Post the review as a GitHub comment
            if [ "$EVENT_NAME" == "pull_request" ]; then
              gh pr comment $PR_NUMBER --body-file review_comment.md
            else
              gh api repos/$REPO/commits/$COMMIT_SHA/comments -f body="$(cat review_comment.md)"
            fi

            # Update the Tech Debt Ledger via a PR (never push directly to main)
            BRANCH="chore/tech-debt-audit-$(date +'%Y%m%d-%H%M')"
            git config --global user.name "Maintenance-Bot"
            git config --global user.email "actions@github.com"
            git checkout -b "$BRANCH"
            printf '\n## Audit: %s\n' "$(date +'%Y-%m-%d %H:%M')" >> docs/TECH_DEBT.md
            cat review_comment.md >> docs/TECH_DEBT.md
            printf '\n---\n' >> docs/TECH_DEBT.md
            git add docs/TECH_DEBT.md
            git commit -m "chore: append AI audit findings to tech debt ledger [skip ci]"
            git push origin "$BRANCH"
            gh pr create \
              --title "chore: AI audit findings $(date +'%Y-%m-%d')" \
              --body "Automated tech-debt ledger update from the AI Code Reviewer workflow. Review and merge after triaging the findings." \
              --base main \
              --head "$BRANCH"
          fi