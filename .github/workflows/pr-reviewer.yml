name: AI Code Reviewer

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize]
  schedule:
    - cron: '0 0 * * 0' # Runs every Sunday at midnight

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Required to diff direct pushes

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Google Generative AI
        run: npm install @google/generative-ai

      - name: AI Code Review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          COMMIT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          # 1. Grab the correct diff
          if [ "$EVENT_NAME" == "pull_request" ]; then
            gh pr diff $PR_NUMBER > diff.txt
          else
            git diff HEAD~1 HEAD > diff.txt
          fi

          # 2. Generate review using external script
          node .github/scripts/review-logic.js
          
          # 3. Handle Posting and Tech Debt Ledger
          if [ -s review_comment.md ]; then
            # Post the review
            if [ "$EVENT_NAME" == "pull_request" ]; then
              gh pr comment $PR_NUMBER --body-file review_comment.md
            else
              gh api repos/$REPO/commits/$COMMIT_SHA/comments -f body="$(cat review_comment.md)"
            fi

            # Update the Tech Debt Ledger
            BRANCH="chore/tech-debt-audit-$(date +'%Y%m%d-%H%M')"
            git config --global user.name "Maintenance-Bot"
            git config --global user.email "actions@github.com"
            git checkout -b "$BRANCH"
            
            mkdir -p docs
            printf '\n## Audit: %s\n' "$(date +'%Y-%m-%d %H:%M')" >> docs/TECH_DEBT.md
            cat review_comment.md >> docs/TECH_DEBT.md
            printf '\n---\n' >> docs/TECH_DEBT.md
            
            git add docs/TECH_DEBT.md
            git commit -m "chore: append AI audit findings to tech debt ledger [skip ci]"
            git push origin "$BRANCH"

            # Create PR with permission-safe check
            echo "Checking for existing PRs..."
            EXISTING_PR=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number')
            
            if [ -n "$EXISTING_PR" ]; then
              echo "PR #$EXISTING_PR already exists for this branch."
            else
              echo "Attempting to create a new PR..."
              if ! gh pr create \
                --title "chore: AI audit findings $(date +'%Y-%m-%d')" \
                --body "Automated tech-debt ledger update from the AI Code Reviewer workflow. Review and merge after triaging the findings. (Ref: $COMMIT_SHA)" \
                --base main \
                --head "$BRANCH"; then
                
                echo "::warning title=PR Creation Blocked::GitHub Actions is likely not permitted to create PRs. Please go to Settings > Actions > General and enable 'Allow GitHub Actions to create and approve pull requests'."
              fi
            fi
          fi